<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lung Sounds Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --ink:        #0f0f0f;
      --ink-mid:    #5a5a5a;
      --ink-faint:  #a8a8a8;
      --rule:       #d8d8d8;
      --rule-strong:#b0b0b0;
      --bg:         #f7f7f5;
      --surface:    #ffffff;
      --surface-2:  #f2f2f0;

      --red:        #c0392b;
      --green:      #27695a;

      --header-h:   52px;
      --panel-w:    280px;
      --transition: 0.12s ease;

      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      font-weight: 300;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────── */
    .site-header {
      height: var(--header-h);
      display: grid;
      grid-template-columns: var(--panel-w) 1fr;
      align-items: center;
      background: var(--ink);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header h1 {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffffff;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Small circle accent before title */
    .site-header h1::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .site-header .subtitle {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      padding: 0 28px;
      border-left: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      align-items: flex-start;
      max-width: 1040px;
      margin: 0 auto;
    }

    /* ── Diagram panel ─────────────────────────────────────────── */
    .diagram-panel {
      width: var(--panel-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: var(--surface);
      border-right: 1px solid var(--rule);
    }

    /* Subtle grid crosshair behind SVG */
    .diagram-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--rule) 1px, transparent 1px),
        linear-gradient(90deg, var(--rule) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
    }

    #lung-svg {
      width: 100%;
      max-width: 190px;
      height: auto;
      display: block;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── SVG highlights ────────────────────────────────────────── */
    .svg-region {
      opacity: 0;
      transition: opacity 0.28s ease, filter 0.28s ease;
    }

    .svg-region.highlighted-normal   { opacity: 0.80; filter: drop-shadow(0 0 5px rgba(39,105,90,.4)); }
    .svg-region.highlighted-abnormal { opacity: 0.80; filter: drop-shadow(0 0 5px rgba(192,57,43,.4)); }

    .svg-region:not(.svg-zone):not(.is-pleura).highlighted-normal  path,
    .svg-region:not(.svg-zone):not(.is-pleura).highlighted-normal  rect { fill: var(--green); stroke: var(--green); }
    .svg-region:not(.svg-zone):not(.is-pleura).highlighted-abnormal path,
    .svg-region:not(.svg-zone):not(.is-pleura).highlighted-abnormal rect { fill: var(--red); stroke: var(--red); }

    .svg-region.is-pleura.highlighted-normal  path { fill: none; stroke: var(--green); }
    .svg-region.is-pleura.highlighted-abnormal path { fill: none; stroke: var(--red); }

    .lung-outline {
      opacity: 1;
      fill: none;
      stroke: #5e5e5d;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .svg-zone path, .svg-zone rect { fill: #888; stroke: none; }

    .svg-region.svg-zone.highlighted-normal {
      opacity: 0.20 !important;
      filter: none !important;
    }
    .svg-region.svg-zone.highlighted-normal path,
    .svg-region.svg-zone.highlighted-normal rect { fill: var(--green); stroke: none; }

    .body-stroke {
      fill: none;
      stroke: #797979;
      stroke-width: 1.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Diagram info ──────────────────────────────────────────── */
    .diagram-info {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      text-align: center;
      min-height: 48px;
      width: 100%;
    }

    /* Thin horizontal rule above info */
    .diagram-info::before {
      content: '';
      display: block;
      height: 1px;
      background: var(--rule);
      margin-bottom: 16px;
    }

    .diag-name {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 5px;
      letter-spacing: 0.04em;
    }

    .diag-region {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── Legend ────────────────────────────────────────────────── */
    .diagram-legend {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* Square legend markers — Bauhaus geometry */
    .leg-dot {
      width: 6px;
      height: 6px;
      border-radius: 0;
      flex-shrink: 0;
    }

    /* ── Sound list ────────────────────────────────────────────── */
    .sound-list {
      flex: 1;
      min-width: 0;
      padding: 36px 36px 80px 36px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Extending line after label */
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .section-label:first-child { margin-top: 0; }

    .section-divider {
      height: 1px;
      background: var(--rule);
      margin: 28px 0 10px;
    }

    /* ── Sound row ─────────────────────────────────────────────── */
    .sound-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 0;           /* Bauhaus: no radius */
      padding: 13px 16px 13px 20px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }

    /* Left accent bar — crisp, geometric */
    .sound-row::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 2px;
      background: var(--row-accent, var(--rule));
      opacity: 0.4;
      transition: opacity var(--transition), width var(--transition);
    }

    .sound-row:hover               { border-color: var(--rule-strong); background: #fafaf8; }
    .sound-row:hover::before       { opacity: 1; }
    .sound-row.active              { border-color: var(--row-accent, var(--rule-strong)); background: var(--surface); }
    .sound-row.active::before      { opacity: 1; width: 3px; }

    /* Type marker — small square, not circle */
    .row-dot {
      width: 7px;
      height: 7px;
      border-radius: 0;
      flex-shrink: 0;
      background: var(--row-accent, var(--rule));
    }

    .row-name {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .row-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faint);
      font-weight: 300;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    /* Play indicator — circle outline on hover/active */
    .row-play {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--row-accent, var(--rule));
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition), background var(--transition);
    }

    .sound-row:hover .row-play,
    .sound-row.active .row-play { opacity: 1; }

    .sound-row.active .row-play {
      background: var(--row-accent, var(--rule));
    }

    .row-play svg {
      width: 9px;
      height: 9px;
      fill: var(--row-accent, var(--ink));
      pointer-events: none;
    }

    .sound-row.active .row-play svg { fill: white; }

    /* ── Info drawer ───────────────────────────────────────────── */
    .info-drawer {
      display: none;
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-top: none;
      border-radius: 0;
      padding: 20px 20px 20px 22px;
      margin-top: -4px;
      margin-bottom: 4px;
      border-left: 3px solid var(--row-accent, var(--rule));
    }

    .drawer-description {
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--ink-mid);
      font-weight: 300;
      margin-bottom: 16px;
      max-width: 52ch;
    }

    .drawer-conditions-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 8px;
    }

    .drawer-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 16px;
    }

    /* Pills: rectangular, mono, stark */
    .pill {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      color: var(--ink-mid);
      border: 1px solid var(--rule-strong);
      border-radius: 0;
      padding: 3px 9px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* ── Playback bar ──────────────────────────────────────────── */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }

    /* Play button: circle outline → filled on active */
    .play-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--row-accent, var(--ink-faint));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: transparent;
      transition: background var(--transition), border-color var(--transition);
    }
    .play-btn:hover  { background: var(--row-accent, var(--ink)); border-color: var(--row-accent, var(--ink)); }
    .play-btn:hover svg { fill: white; }
    .play-btn:active { opacity: 0.75; }

    .play-btn svg {
      width: 11px;
      height: 11px;
      fill: var(--row-accent, var(--ink));
      pointer-events: none;
      transition: fill var(--transition);
    }

    .playback-status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }
    .playback-status.playing     { color: var(--row-accent, var(--ink)); }
    .playback-status.unavailable { color: var(--red); }

    /* ── Focus ring ────────────────────────────────────────────── */
    .sound-row:focus-visible {
      outline: 2px solid var(--row-accent, var(--ink));
      outline-offset: 2px;
    }
    .play-btn:focus-visible {
      outline: 2px solid var(--row-accent, var(--ink));
      outline-offset: 3px;
    }

    /* ── Mobile ────────────────────────────────────────────────── */
    @media (max-width: 680px) {
      .site-header {
        grid-template-columns: 1fr;
        padding: 0 20px;
      }
      .site-header .subtitle { display: none; }

      .app-shell {
        flex-direction: column;
        gap: 0;
      }

      .diagram-panel {
        width: 100%;
        height: auto;
        position: sticky;
        top: var(--header-h);
        flex-direction: row;
        justify-content: center;
        gap: 24px;
        padding: 20px 24px;
        border-right: none;
        border-bottom: 1px solid var(--rule);
        z-index: 90;
      }

      #lung-svg       { max-width: 100px; }
      .diagram-legend { margin-top: 0; flex-direction: column; gap: 8px; }
      .diagram-info   { margin-top: 0; text-align: left; min-height: auto; }
      .diagram-info::before { display: none; }
      .sound-list     { width: 100%; padding: 20px 20px 80px; }

      @media (max-width: 400px) {
        .row-tag { display: none; }
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1>Lung Sounds Explorer</h1>
    <span class="subtitle">Select a sound to highlight anatomy &amp; play audio</span>
  </header>

  <div class="app-shell">

    <aside class="diagram-panel">
      <svg id="lung-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="Lung anatomy diagram">

        <path class="lung-outline" d="M75 130 Q82 128 90 130"   stroke-dasharray="3 2" stroke-width="1"/>
        <path class="lung-outline" d="M185 130 Q178 128 170 130" stroke-dasharray="3 2" stroke-width="1"/>

        <!-- Listening zones (normal sounds only) -->
        <g id="svg-post-bronchial" class="svg-region svg-zone">
          <rect x="118" y="10" width="24" height="60" rx="8" fill="#888"/>
        </g>
        <g id="svg-post-bronchovesicular" class="svg-region svg-zone">
          <path d="M120 72 Q128 78 128 110 L96 110 Q80 100 74 85 Q70 76 80 72 Z" fill="#888"/>
          <path d="M140 72 Q132 78 132 110 L164 110 Q180 100 186 85 Q190 76 180 72 Z" fill="#888"/>

          <path d="M96 70 Q80 80 70 100 Q58 125 58 148 Q58 175 68 192 Q80 210 96 215 Q112 218 120 210 Q128 200 128 185 L128 90 Q128 78 122 72 Z" fill="#888"/>

      </svg>

      <div class="diagram-info">
        <p class="diag-name" id="diag-name" style="color:var(--ink-faint); font-style:italic; font-size:11px;">Select a sound</p>
        <p class="diag-region" id="diag-region"></p>
      </div>

      <div class="diagram-legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Normal</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Abnormal</div>
      </div>
    </aside>

    <main class="sound-list" id="sound-list"></main>
  </div>

  <audio id="audio-player"></audio>

  <script>
  /* ── Sound data ──────────────────────────────────────────────── */
  const lungSounds = {
    vesicular: {
      file: 'sounds/vesicular.mp3',
      name: 'Vesicular',
      tag: 'Soft · Low-pitched',
      description: 'Soft, low-pitched sounds heard over most lung fields. Inspiration is longer than expiration with no pause between phases. Produced by airflow through peripheral small airways — the hallmark of healthy lung tissue.',
      diseases: ['Healthy lung', 'Normal baseline'],
      region: 'normal',
      type: 'normal'
    },
    bronchial: {
      file: 'sounds/bronchial.mp3',
      name: 'Bronchial',
      tag: 'Loud · High-pitched · Tubular',
      description: 'Loud, high-pitched sounds normally heard over the trachea and manubrium. Expiration is longer than inspiration with a distinct pause. When heard peripherally, they suggest consolidation.',
      diseases: ['Normal over trachea', 'Lobar pneumonia', 'Consolidation'],
      region: 'bronchial',
      type: 'normal'
    },
    bronchovesicular: {
      file: 'sounds/bronchovesicular.mp3',
      name: 'Bronchovesicular',
      tag: 'Intermediate · Equal phases',
      description: 'Intermediate between bronchial and vesicular in pitch and intensity. Inspiration and expiration are roughly equal in duration. Normally heard near the main bronchi — 1st to 2nd intercostal spaces anteriorly, or between the scapulae posteriorly.',
      diseases: ['Normal over main bronchi', 'Early consolidation'],
      region: 'bronchovesicular',
      type: 'normal'
    },
    wheeze: {
      file: 'sounds/wheeze.mp3',
      name: 'Wheeze',
      tag: 'Continuous · High-pitched',
      description: 'Continuous, musical, high-pitched sounds from narrowed or obstructed airways. Predominantly expiratory but may be biphasic. Polyphonic wheezes suggest diffuse narrowing; a monophonic wheeze may indicate fixed obstruction.',
      diseases: ['Asthma', 'COPD', 'Anaphylaxis', 'Foreign body aspiration'],
      region: 'bronchi',
      type: 'abnormal'
    },
    crackles: {
      file: 'sounds/crackles.mp3',
      name: 'Crackles / Rales',
      tag: 'Discontinuous · Inspiratory',
      description: 'Discontinuous, non-musical sounds from sudden opening of collapsed airways or fluid-filled alveoli during inspiration. Fine crackles resemble Velcro peeling; coarse crackles are louder and lower-pitched. Typically heard at the bases.',
      diseases: ['Pulmonary fibrosis', 'Pulmonary oedema', 'Pneumonia', 'Heart failure'],
      region: 'alveoli',
      type: 'abnormal'
    },
    rhonchi: {
      file: 'sounds/rhonchi.mp3',
      name: 'Rhonchi',
      tag: 'Continuous · Low-pitched',
      description: 'Low-pitched, continuous, rumbling sounds from secretions or dynamic narrowing in larger airways. Predominantly expiratory. May clear with coughing — unlike crackles. Suggests mucus hypersecretion or endobronchial pathology.',
      diseases: ['Chronic bronchitis', 'COPD exacerbation', 'Bronchiectasis'],
      region: 'bronchi',
      type: 'abnormal'
    },
    stridor: {
      file: 'sounds/stridor.mp3',
      name: 'Stridor',
      tag: 'Inspiratory · Harsh · Monophonic',
      description: 'A high-pitched, harsh, monophonic sound from turbulent airflow through a critically narrowed upper airway. Predominantly inspiratory, often audible without a stethoscope. A medical emergency until a reversible cause is excluded.',
      diseases: ['Croup', 'Epiglottitis', 'Tracheal stenosis', 'Foreign body', 'Anaphylaxis'],
      region: 'trachea',
      type: 'abnormal'
    },
    pleuralRub: {
      file: 'sounds/pleural-rub.mp3',
      name: 'Pleural Friction Rub',
      tag: 'Biphasic · Grating',
      description: 'A coarse, grating sound when inflamed pleural surfaces move against each other during breathing. Heard in both phases, does not clear with coughing. Disappears if a pleural effusion develops and separates the surfaces.',
      diseases: ['Pleuritis', 'Pulmonary embolism', 'Pneumonia with pleuritis', 'Mesothelioma'],
      region: 'pleura',
      type: 'abnormal'
    },
    decreasedBS: {
      file: 'sounds/decreased-breath-sounds.mp3',
      name: 'Decreased Breath Sounds',
      tag: 'Reduced amplitude',
      description: 'Reduced or absent sounds from diminished airflow, increased chest-wall distance, or attenuated transmission. Best appreciated by comparing symmetrical zones. Unilateral decrease warrants further workup.',
      diseases: ['Pleural effusion', 'Pneumothorax', 'COPD', 'Obesity', 'Consolidation'],
      region: 'parenchyma',
      type: 'abnormal'
    }
  };

  /* ── Region → SVG IDs ────────────────────────────────────────── */
  const regionToSVGIds = {
    trachea:          ['svg-trachea'],
    bronchial:        ['svg-post-bronchial'],
    bronchovesicular: ['svg-post-bronchovesicular'],
    bronchi:          ['svg-bronchi-left', 'svg-bronchi-right'],
    alveoli:          ['svg-bases-left', 'svg-bases-right'],
    pleura:           ['svg-pleura-left', 'svg-pleura-right'],
    parenchyma:       ['svg-parenchyma-left', 'svg-parenchyma-right'],
    normal:           ['svg-post-vesicular']
  };

  const regionLabel = {
    trachea:          'Trachea / Upper Airway',
    bronchial:        'Manubrium / Upper Sternum',
    bronchovesicular: '1st–2nd ICS, Parasternal',
    bronchi:          'Bronchi',
    alveoli:          'Alveoli / Lung Bases',
    pleura:           'Pleura',
    parenchyma:       'Lung Parenchyma',
    normal:           'All Lung Fields'
  };

  const COLOR = { normal: '#27695a', abnormal: '#c0392b' };

  /* ── State ───────────────────────────────────────────────────── */
  let activeKey    = null;
  let activeRow    = null;
  let activeDrawer = null;
  let isPlaying    = false;

  const audioPlayer = document.getElementById('audio-player');
  const diagName    = document.getElementById('diag-name');
  const diagRegion  = document.getElementById('diag-region');

  /* ── SVG highlight ───────────────────────────────────────────── */
  function highlightRegions(region, type) {
    document.querySelectorAll('.svg-region').forEach(el =>
      el.classList.remove('highlighted-normal', 'highlighted-abnormal')
    );
    const cls = `highlighted-${type}`;
    (regionToSVGIds[region] || []).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add(cls);
    });
  }

  function clearHighlights() {
    document.querySelectorAll('.svg-region').forEach(el =>
      el.classList.remove('highlighted-normal', 'highlighted-abnormal')
    );
  }

  /* ── Playback state ──────────────────────────────────────────── */
  const STATUS_LABELS = {
    idle: 'Click to play', playing: 'Playing…',
    paused: 'Paused', finished: 'Finished', unavailable: 'File not available'
  };

  const PLAY_ICON  = '<path d="M5 3l14 9-14 9V3z"/>';
  const PAUSE_ICON = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';

  function setPlaybackState(state) {
    isPlaying = (state === 'playing');
    if (!activeDrawer) return;

    const playIcon  = activeDrawer.querySelector('.play-icon');
    const pauseIcon = activeDrawer.querySelector('.pause-icon');
    const statusEl  = activeDrawer.querySelector('.playback-status');

    if (playIcon)  playIcon.style.display  = isPlaying ? 'none'  : 'block';
    if (pauseIcon) pauseIcon.style.display = isPlaying ? 'block' : 'none';

    if (statusEl) {
      statusEl.className   = 'playback-status';
      statusEl.textContent = STATUS_LABELS[state] || '';
      if (state === 'playing')     statusEl.classList.add('playing');
      if (state === 'unavailable') statusEl.classList.add('unavailable');
    }

    if (activeRow) {
      const rowPlaySvg = activeRow.querySelector('.row-play svg');
      if (rowPlaySvg) rowPlaySvg.innerHTML = isPlaying ? PAUSE_ICON : '<path d="M3 2l10 6-10 6V2z"/>';
    }
  }

  audioPlayer.addEventListener('ended',  () => setPlaybackState('finished'));
  audioPlayer.addEventListener('error',  () => setPlaybackState('unavailable'));

  /* ── Build list ──────────────────────────────────────────────── */
  function buildList() {
    const list     = document.getElementById('sound-list');
    const normal   = Object.entries(lungSounds).filter(([, s]) => s.type === 'normal');
    const abnormal = Object.entries(lungSounds).filter(([, s]) => s.type === 'abnormal');

    function renderGroup(entries, labelText) {
      const lbl = document.createElement('p');
      lbl.className   = 'section-label';
      lbl.textContent = labelText;
      list.appendChild(lbl);

      entries.forEach(([key, sound]) => {
        const accent = COLOR[sound.type];

        /* Row */
        const row = document.createElement('article');
        row.className = 'sound-row';
        row.setAttribute('role', 'button');
        row.setAttribute('tabindex', '0');
        row.setAttribute('aria-expanded', 'false');
        row.setAttribute('aria-label', sound.name);
        row.style.setProperty('--row-accent', accent);
        row.innerHTML = `
          <div class="row-dot"></div>
          <span class="row-name">${sound.name}</span>
          <span class="row-tag">${sound.tag}</span>
          <div class="row-play">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2l10 6-10 6V2z"/></svg>
          </div>`;

        /* Drawer */
        const drawer = document.createElement('div');
        drawer.className = 'info-drawer';
        drawer.setAttribute('role', 'region');
        drawer.setAttribute('aria-label', `Details for ${sound.name}`);
        drawer.style.setProperty('--row-accent', accent);
        drawer.innerHTML = `
          <p class="drawer-description">${sound.description}</p>
          <p class="drawer-conditions-label">Associated conditions</p>
          <div class="drawer-pills">${sound.diseases.map(d => `<span class="pill">${d}</span>`).join('')}</div>
          <div class="playback-bar">
            <button class="play-btn" aria-label="Play or pause ${sound.name}" style="--row-accent:${accent}">
              <svg class="play-icon"  viewBox="0 0 24 24">${PLAY_ICON}</svg>
              <svg class="pause-icon" viewBox="0 0 24 24" style="display:none">${PAUSE_ICON}</svg>
            </button>
            <span class="playback-status">Click to play</span>
          </div>`;

        drawer.querySelector('.play-btn').addEventListener('click', e => {
          e.stopPropagation();
          if (isPlaying) {
            audioPlayer.pause();
            setPlaybackState('paused');
          } else {
            audioPlayer.play().catch(() => setPlaybackState('unavailable'));
            setPlaybackState('playing');
          }
        });

        function handleSelect() {
          /* Toggle closed if already active */
          if (activeKey === key) {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            setPlaybackState('idle');
            activeDrawer.style.display = 'none';
            row.setAttribute('aria-expanded', 'false');
            row.classList.remove('active');
            clearHighlights();
            diagName.textContent  = 'Select a sound';
            diagName.style.color  = 'var(--ink-faint)';
            diagName.style.fontStyle = 'italic';
            diagRegion.textContent = '';
            activeKey = activeRow = activeDrawer = null;
            return;
          }

          /* Deactivate previous */
          audioPlayer.pause();
          audioPlayer.currentTime = 0;
          if (activeRow)    { activeRow.classList.remove('active'); activeRow.setAttribute('aria-expanded', 'false'); }
          if (activeDrawer) { activeDrawer.style.display = 'none'; }

          /* Activate */
          activeKey    = key;
          activeRow    = row;
          activeDrawer = drawer;
          row.classList.add('active');
          row.setAttribute('aria-expanded', 'true');
          drawer.style.display = 'block';

          highlightRegions(sound.region, sound.type);
          diagName.textContent     = sound.name;
          diagName.style.color     = accent;
          diagName.style.fontStyle = 'normal';
          diagRegion.textContent   = regionLabel[sound.region] || '';

          audioPlayer.src = sound.file;
          audioPlayer.load();
          audioPlayer.play()
            .then(()  => setPlaybackState('playing'))
            .catch(() => setPlaybackState('unavailable'));
        }

        row.addEventListener('click', handleSelect);
        row.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleSelect(); }
        });

        list.appendChild(row);
        list.appendChild(drawer);
      });
    }

    renderGroup(normal, 'Normal Sounds');

    const divider = document.createElement('div');
    divider.className = 'section-divider';
    list.appendChild(divider);

    renderGroup(abnormal, 'Adventitious Sounds');
  }

  buildList();
  </script>

</body>
</html>
